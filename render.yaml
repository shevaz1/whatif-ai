services:
  - type: web
    name: whatif-ai-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: OPENAI_MODEL
        value: gpt-5-nano
      - key: OPENAI_REASONING_EFFORT
        value: minimal
      - key: OPENAI_API_KEY
        sync: false
